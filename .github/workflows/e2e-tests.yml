name: E2E Tests with Playwright Traces

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger

# Allow GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # ─── Python / FastAPI backend ─────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python deps
        run: pip install -r backend/requirements.txt

      - name: Start FastAPI backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          # wait until backend responds
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/api/health && break
            sleep 1
          done

      # ─── Node / Angular frontend ─────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Angular deps
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Start Angular dev server (with API proxy)
        run: |
          cd frontend
          npx ng serve --proxy-config proxy.conf.json --host 0.0.0.0 --port 4200 &
          for i in $(seq 1 60); do
            curl -s http://localhost:4200/ && break
            sleep 2
          done

      # ─── Playwright E2E tests ────────────────────────────────────
      - name: Install Playwright deps
        run: cd e2e && npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: playwright
        # Allow the step to fail — we still want to upload artifacts
        continue-on-error: true
        env:
          BASE_URL: http://localhost:4200
        run: |
          cd e2e
          npx playwright test --trace on 2>&1 | tee playwright-output.txt

      - name: Print Playwright output summary
        if: always()
        run: |
          cd e2e
          echo "=== Playwright test results ==="
          if [ -f playwright-output.txt ]; then
            grep -E 'passed|failed|flaky|skipped|Error' playwright-output.txt || true
          fi

      # ─── Upload artifact (downloadable zip) ──────────────────────
      - name: Upload Playwright HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: e2e/playwright-report/
          retention-days: 14
          if-no-files-found: warn

      # ─── Deploy to GitHub Pages (hosted report, traces work!) ──
      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: e2e/playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
